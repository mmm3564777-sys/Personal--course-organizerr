<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Game Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1 class="logo">NEXUS</h1>
            <div class="title-section">
                <h2>LIBRARY</h2>
                <p>Access your collection. Engineered for maximum performance.</p>
            </div>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchGames()" placeholder="Search titles...">
            <span class="icon">🔍</span>
        </div>

        <div class="categories">
            <button class="btn active">ALL GAMES</button>
            <button class="btn">RPG</button>
            <button class="btn">SHOOTER</button>
            <button class="btn">STRATEGY</button>
        </div>

        <div class="games-grid" id="gamesGrid">
            
            <div class="game-card" onclick="launchGame('Neon Overdrive')">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500" alt="Neon Overdrive">
                <div class="game-info">
                    <h3>NEON OVERDRIVE</h3>
                </div>
            </div>

            <div class="game-card" onclick="launchGame('Void Walker')">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500" alt="Void Walker">
                <div class="game-info">
                    <h3>VOID WALKER</h3>
                </div>
            </div>

            <div class="game-card" onclick="launchGame('Cursed Realms')">
